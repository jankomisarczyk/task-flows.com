<div class="full-height">
  @if (pdfViewerSrc) {
  <iframe
    id="pdf-js-viewer"
    [src]="pdfViewerSrc"
    title="webviewer"
    frameborder="0"
    width="100%"
    height="100%"
  ></iframe>
  } @else {
  <input type="file" id="fileInput" (change)="onFileSelected($event)" />
  }
</div>
